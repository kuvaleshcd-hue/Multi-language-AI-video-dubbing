<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500,400&f[]=general-sans@600,400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Satoshi', sans-serif;
            background-color: #fafafa;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        input:focus {
            outline: none;
            border-color: #000;
            box-shadow: 0 0 0 1px #000;
        }
        .social-btn:hover {
            background-color: #f3f4f6;
            transform: translateY(-1px);
        }
        .primary-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .primary-btn:hover {
            transform: translateY(-1px);
            background-color: #111;
        }
        .gradient-bg {
            background-image: radial-gradient(circle at top right, rgba(240, 240, 240, 0.8), transparent),
                              radial-gradient(circle at bottom left, rgba(245, 245, 245, 0.8), transparent);
        }
    </style>
</head>
<body>
    <div class="min-h-screen flex items-center justify-center p-6 gradient-bg">
        <div class="w-full max-w-md bg-white border border-slate-200 rounded-[32px] shadow-[0_8px_30px_rgb(0,0,0,0.04)] p-10 space-y-8 animate-in fade-in zoom-in duration-500">
            
            <!-- Header -->
            <div class="text-center space-y-3">
                <div class="inline-flex items-center justify-center w-12 h-12 bg-black rounded-xl mb-4">
                    <iconify-icon icon="lucide:layers" class="text-white text-2xl"></iconify-icon>
                </div>
                <h1 class="text-3xl font-bold tracking-tight text-slate-900">Welcome back</h1>
                <p class="text-slate-500 text-sm">Enter your credentials to access your account</p>
            </div>

            <!-- Social Login Buttons -->
            <div class="grid grid-cols-3 gap-3">
                <button id="social-google" class="social-btn flex items-center justify-center py-2.5 border border-slate-200 rounded-xl transition-all duration-200">
                    <iconify-icon icon="logos:google-icon" class="text-lg"></iconify-icon>
                </button>
                <button id="social-github" class="social-btn flex items-center justify-center py-2.5 border border-slate-200 rounded-xl transition-all duration-200">
                    <iconify-icon icon="logos:github-icon" class="text-xl"></iconify-icon>
                </button>
                <button id="social-apple" class="social-btn flex items-center justify-center py-2.5 border border-slate-200 rounded-xl transition-all duration-200">
                    <iconify-icon icon="logos:apple" class="text-lg"></iconify-icon>
                </button>
            </div>

            <!-- Divider -->
            <div class="relative py-2">
                <div class="absolute inset-0 flex items-center">
                    <span class="w-full border-t border-slate-100"></span>
                </div>
                <div class="relative flex justify-center text-xs uppercase">
                    <span class="bg-white px-4 text-slate-400 font-medium">Or continue with email</span>
                </div>
            </div>

            <!-- Login Form -->
            <form class="space-y-5" onsubmit="return false">
                <!-- Email Field -->
                <div class="space-y-1.5">
                    <label for="email" class="text-sm font-semibold text-slate-700 ml-1">Email address</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400">
                            <iconify-icon icon="lucide:mail" class="text-lg"></iconify-icon>
                        </span>
                        <input id="email" type="email" placeholder="name@company.com" class="w-full pl-11 pr-4 py-3 bg-slate-50/50 border border-slate-200 rounded-xl transition-all placeholder:text-slate-400">
                    </div>
                </div>

                <!-- Password Field -->
                <div class="space-y-1.5">
                    <label for="password" class="text-sm font-semibold text-slate-700 ml-1">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center text-slate-400">
                            <iconify-icon icon="lucide:lock" class="text-lg"></iconify-icon>
                        </span>
                        <input id="password" type="password" placeholder="••••••••" class="w-full pl-11 pr-11 py-3 bg-slate-50/50 border border-slate-200 rounded-xl transition-all placeholder:text-slate-400">
                        <button type="button" class="absolute inset-y-0 right-0 pr-3.5 flex items-center text-slate-400 hover:text-slate-600">
                            <iconify-icon icon="lucide:eye" class="text-lg"></iconify-icon>
                        </button>
                    </div>
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="flex items-center justify-between px-1">
                    <label class="flex items-center space-x-2.5 cursor-pointer group">
                        <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-black focus:ring-0 cursor-pointer">
                        <span class="text-sm text-slate-500 group-hover:text-slate-700 transition-colors">Remember me</span>
                    </label>
                    <a href="#" id="forgot-password-link" class="text-sm font-semibold text-black hover:underline underline-offset-4">Forgot password?</a>
                </div>

                <!-- Sign In Button -->
                <button type="submit" id="login-btn" class="primary-btn w-full bg-black text-white py-3.5 rounded-xl font-bold shadow-lg shadow-black/5 flex items-center justify-center space-x-2">
                    Sign in
                </button>
            </form>

            <!-- Sign Up Link -->
            <p class="text-center text-slate-500 text-sm px-4">Don't have an account? <a href="#" id="signup-redirect-link" class="text-black font-bold hover:underline underline-offset-4">Create one for free</a></p>
        </div>
    </div>
</body>
</html>
