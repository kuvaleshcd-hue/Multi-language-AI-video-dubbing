<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500,400&f[]=general-sans@600,400&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Satoshi', sans-serif;
        }
        .gradient-bg {
            background-color: #fafafa;
            background-image: radial-gradient(circle at top right, rgba(240, 240, 240, 0.8), transparent),
                              radial-gradient(circle at bottom left, rgba(245, 245, 245, 0.8), transparent);
        }
        .input-focus:focus {
            outline: none;
            border-color: #000;
            box-shadow: 0 0 0 1px #000;
        }
        .hover-lift {
            transition: all 0.2s ease;
        }
        .hover-lift:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="min-h-screen gradient-bg flex items-center justify-center p-6 lg:p-12">
        <div class="w-full max-w-[480px] bg-white border border-slate-200 rounded-[32px] shadow-[0_8px_30px_rgb(0,0,0,0.04)] p-8 md:p-12 space-y-8">
            
            <!-- Header -->
            <div class="text-center space-y-3">
                <div class="inline-flex items-center justify-center w-14 h-14 bg-black rounded-2xl mb-2">
                    <iconify-icon icon="lucide:layers" class="text-white text-3xl"></iconify-icon>
                </div>
                <h1 class="text-3xl font-bold tracking-tight text-slate-900">Create an account</h1>
                <p class="text-slate-500 text-sm">Join us today and start your journey</p>
            </div>

            <!-- Social Login -->
            <div class="grid grid-cols-3 gap-4">
                <button id="social-reg-google" class="hover-lift flex items-center justify-center py-3 border border-slate-200 rounded-2xl bg-white hover:bg-slate-50">
                    <iconify-icon icon="logos:google-icon" class="text-xl"></iconify-icon>
                </button>
                <button id="social-reg-github" class="hover-lift flex items-center justify-center py-3 border border-slate-200 rounded-2xl bg-white hover:bg-slate-50">
                    <iconify-icon icon="logos:github-icon" class="text-2xl"></iconify-icon>
                </button>
                <button id="social-reg-apple" class="hover-lift flex items-center justify-center py-3 border border-slate-200 rounded-2xl bg-white hover:bg-slate-50">
                    <iconify-icon icon="logos:apple" class="text-xl"></iconify-icon>
                </button>
            </div>

            <!-- Divider -->
            <div class="relative py-2">
                <div class="absolute inset-0 flex items-center">
                    <span class="w-full border-t border-slate-100"></span>
                </div>
                <div class="relative flex justify-center text-xs uppercase">
                    <span class="bg-white px-4 text-slate-400 font-semibold tracking-wider">Or use email</span>
                </div>
            </div>

            <!-- Registration Form -->
            <form class="space-y-5" onsubmit="return false">
                <!-- Full Name -->
                <div class="space-y-1.5">
                    <label for="full-name" class="text-sm font-semibold text-slate-700 ml-1">Full Name</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <iconify-icon icon="lucide:user" class="text-lg"></iconify-icon>
                        </span>
                        <input id="full-name" type="text" placeholder="John Doe" class="w-full pl-12 pr-4 py-3.5 bg-slate-50/50 border border-slate-200 rounded-2xl input-focus placeholder:text-slate-400 transition-all">
                    </div>
                </div>

                <!-- Email -->
                <div class="space-y-1.5">
                    <label for="reg-email" class="text-sm font-semibold text-slate-700 ml-1">Email address</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <iconify-icon icon="lucide:mail" class="text-lg"></iconify-icon>
                        </span>
                        <input id="reg-email" type="email" placeholder="name@example.com" class="w-full pl-12 pr-4 py-3.5 bg-slate-50/50 border border-slate-200 rounded-2xl input-focus placeholder:text-slate-400 transition-all">
                    </div>
                </div>

                <!-- Password -->
                <div class="space-y-1.5">
                    <label for="reg-password" class="text-sm font-semibold text-slate-700 ml-1">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <iconify-icon icon="lucide:lock" class="text-lg"></iconify-icon>
                        </span>
                        <input id="reg-password" type="password" placeholder="••••••••" class="w-full pl-12 pr-12 py-3.5 bg-slate-50/50 border border-slate-200 rounded-2xl input-focus placeholder:text-slate-400 transition-all">
                        <button type="button" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-slate-600">
                            <iconify-icon icon="lucide:eye" class="text-lg"></iconify-icon>
                        </button>
                    </div>
                </div>

                <!-- Terms Agreement -->
                <div class="flex items-start space-x-3 px-1">
                    <input id="agree-terms" type="checkbox" class="w-4 h-4 mt-1 rounded border-slate-300 text-black focus:ring-0 cursor-pointer">
                    <label for="agree-terms" class="text-sm text-slate-500 leading-tight">
                        I agree to the <a href="#" id="reg-terms-link" class="text-black font-semibold hover:underline">Terms of Service</a> and <a href="#" id="reg-privacy-link" class="text-black font-semibold hover:underline">Privacy Policy</a>
                    </label>
                </div>

                <!-- Register Button -->
                <button type="submit" id="register-submit-btn" class="hover-lift w-full bg-black text-white py-4 rounded-2xl font-bold shadow-lg shadow-black/10 flex items-center justify-center gap-2">
                    Create Account
                    <iconify-icon icon="lucide:arrow-right"></iconify-icon>
                </button>
            </form>

            <!-- Sign In Link -->
            <p class="text-center text-slate-500 text-sm">
                Already have an account? 
                <a href="#" id="login-redirect-link" class="text-black font-bold hover:underline underline-offset-4">Sign in</a>
            </p>
        </div>

        <!-- Footer Helpers -->
        <div class="fixed bottom-8 text-slate-400 text-xs flex space-x-6">
            <a href="#" id="footer-help-link" class="hover:text-slate-600">Need help?</a>
            <a href="#" id="footer-language-select" class="hover:text-slate-600 flex items-center gap-1">
                <iconify-icon icon="lucide:language"></iconify-icon>
                English (US)
            </a>
        </div>
    </div>
</body>
</html>
